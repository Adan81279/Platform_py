<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>Gestión de Lugares - Apex Auto System</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            background-color: #f0f4f8;
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
        }
        /* ESTILOS DEL HEADER Y NAV (IGUALES A DASHBOARD) */
        .header-section {
            background-color: white;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .logo {
            width: 140px;
            height: auto;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link-custom {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-link-custom:hover,
        .nav-link-custom.active {
            color: #fff;
            background-color: #3182ce;
        }
        .nav-link-custom i {
            margin-right: 8px;
            font-size: 16px;
        }
        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar-header {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3182ce;
        }
        .user-name-header {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        /* ESTILOS DE LA TARJETA PRINCIPAL */
        .main-panel-card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            margin-bottom: 50px;
        }
        .panel-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #2b6cb0;
            margin-bottom: 25px;
            position: relative;
        }
        .panel-title::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: #2b6cb0;
        }
        .btn-add-custom {
            background-color: #3182ce;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .table-custom-clear {
            width: 100%;
            margin-top: 20px;
            border-collapse: separate;
            border-spacing: 0;
        }
        .table-custom-clear thead th {
            color: #718096;
            font-size: 13px;
            padding: 15px;
            border-bottom: 1px solid #edf2f7;
        }
        .table-custom-clear tbody td {
            color: #4a5568;
            font-size: 14px;
            padding: 15px;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
        }
    </style>
</head>
<body>
    <header class="header-section">
        <img src="{{ url_for('static', filename='img/FontTrack.png') }}" alt="Logo" class="logo" onclick="window.location.href='{{ url_for('main.index') }}'" />
        <nav class="nav-links">
            <a href="{{ url_for('main.dashboard') }}" class="nav-link-custom {{ 'active' if request.endpoint == 'main.dashboard' else '' }}"><i class="bi bi-person-badge"></i>Usuarios</a>
            <a href="{{ url_for('main.lugares') }}" class="nav-link-custom {{ 'active' if request.endpoint == 'main.lugares' else '' }}"><i class="bi bi-geo-alt"></i>Lugares</a>
            <a href="{{ url_for('main.materiales') }}" class="nav-link-custom {{ 'active' if request.endpoint == 'main.materiales' else '' }}"><i class="bi bi-box-seam"></i>Materiales</a>
            <a href="{{ url_for('main.vehiculos') }}" class="nav-link-custom {{ 'active' if request.endpoint == 'main.vehiculos' else '' }}"><i class="bi bi-car-front"></i>Vehículos</a>
            <a href="{{ url_for('main.reportes') }}" class="nav-link-custom {{ 'active' if request.endpoint == 'main.reportes' else '' }}"><i class="bi bi-file-earmark-bar-graph"></i>Reportes</a>
        </nav>
        <div class="user-profile-header">
            <img src="{{ url_for('static', filename='img/usuarios/' + (current_user.foto_usuario_url if current_user.foto_usuario_url else 'default.png')) }}" class="user-avatar-header" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name={{ current_user.nombre }}&background=3182ce&color=fff';" />
            <span class="user-name-header">{{ current_user.nombre }}</span>
            <a href="{{ url_for('main.logout') }}" class="btn btn-sm btn-outline-danger ms-2">Salir</a>
        </div>
    </header>
    <div class="container-xl">
        <div class="main-panel-card">
            <h2 class="panel-title">Gestión de Lugares</h2>

            <button class="btn btn-add-custom" onclick="abrirModalNuevo()">
                <i class="bi bi-plus-lg me-2"></i> Registrar Lugar
            </button>

            <div class="table-responsive">
                <table class="table table-custom-clear">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for lugar in lugares %}
                        <tr>
                            <td>{{ lugar.nombre }}</td>
                            <td>
                                <span class="badge {{ 'bg-success' if lugar.estado == 'Activo' else 'bg-light text-dark border' }}">
                                    {{ lugar.estado if lugar.estado else 'N/A' }}
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-info btn-sm text-white btnVer" data-id="{{ lugar._id }}">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-warning btn-sm text-white btnEditar" data-id="{{ lugar._id }}">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-danger btn-sm btnEliminar" data-id="{{ lugar._id }}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRegistro" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px;">
                <form id="formLugar">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" id="lugarId" name="lugarId">
                    <div class="modal-header border-0">
                        <h5 class="modal-title fw-bold">Detalles del Lugar</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <input type="text" id="estado" name="estado" class="form-control" placeholder="Ej: México, Jalisco, etc.">
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" style="background-color: #3182ce; border: none;">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Información del Lugar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <i class="bi bi-geo-alt text-primary" style="font-size: 3rem; color: #3182ce !important;"></i>
                    <h4 id="detNombre" class="mt-3 fw-bold"></h4>
                    <p id="detEstado" class="text-muted"></p>
                    <hr>
                    <small class="text-muted">ID: <span id="detId"></span></small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function abrirModalNuevo() {
            $('#lugarId').val(''); 
            $('#formLugar')[0].reset();
            $('#modalRegistro').modal('show');
        }

        $(document).ready(function () {
            const csrfToken = $('meta[name="csrf-token"]').attr("content");

            $.ajaxSetup({
                beforeSend: function(xhr, settings) {
                    if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
                        xhr.setRequestHeader("X-CSRFToken", csrfToken);
                    }
                }
            });

            $('.btnVer').on('click', function () {
                let id = $(this).data('id');
                $.get(`/lugares/${id}`, function (data) {
                    $('#detId').text(data._id);
                    $('#detNombre').text(data.nombre);
                    $('#detEstado').text(data.estado || 'Sin especificar');
                    $('#modalDetalle').modal('show');
                });
            });

            $('.btnEditar').on('click', function () {
                let id = $(this).data('id');
                $.get(`/lugares/${id}`, function (data) {
                    $('#lugarId').val(data._id); 
                    $('#nombre').val(data.nombre);
                    $('#estado').val(data.estado);
                    $('#modalRegistro').modal('show');
                });
            });

            $('.btnEliminar').on('click', function () {
                let id = $(this).data('id');
                if (confirm('¿Estás seguro de eliminar este lugar?')) {
                    $.ajax({
                        url: `/lugares/${id}`,
                        type: 'DELETE',
                        success: function () { location.reload(); }
                    });
                }
            });

            $('#formLugar').on('submit', function (e) {
                e.preventDefault();
                const id = $('#lugarId').val();
                const url = id ? `/lugares/update/${id}` : '/lugares/add';
                const payload = {
                    nombre: $('#nombre').val().trim(),
                    estado: $('#estado').val().trim()
                };

                $.ajax({
                    url: url,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(payload),
                    success: function () { location.reload(); }
                });
            });
        });
    </script>
</body>
</html>
